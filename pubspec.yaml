name: asha_setu
description: "An AI-powered healthcare assistant for ASHA workers in rural areas."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  speech_to_text: ^6.5.1
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  connectivity_plus: ^5.0.2
  uuid: ^4.3.3
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
